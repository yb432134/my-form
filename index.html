<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Request Your Free Quote</title>
<style>
  /* Background gradient animation */
  @keyframes gradientShift {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* Fade-in and slide up animation for form elements */
  @keyframes fadeSlideUp {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  body {
    margin: 0;
    background: #232f20;
    font-family: Arial, sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #quote-form-container {
    background: linear-gradient(270deg, #EBEDDE 0%, #C7D3C6 50%, #EBEDDE 100%);
    background-size: 600% 600%;
    animation: gradientShift 20s ease infinite;
    padding: 20px 30px 30px;
    max-width: 600px;
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    color: #232f20;
  }

  #quote-form-container h2 {
    margin-top: 0;
    color: #232f20;
    animation: fadeSlideUp 1s ease forwards;
  }

  #quote-form-container p {
    margin-top: 5px;
    margin-bottom: 25px;
    color: #232f20;
    animation: fadeSlideUp 1s ease forwards;
    animation-delay: 0.1s;
  }

  form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
    color: #232f20;
    animation: fadeSlideUp 1s ease forwards;
    animation-delay: 0.2s;
  }

  input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 12px;
    border: 1px solid #999;
    font-size: 1em;
    box-sizing: border-box;
    background-color: rgba(255 255 255 / 0.8);
    color: #232f20;
    animation: fadeSlideUp 1s ease forwards;
    animation-delay: 0.3s;
  }

  input::placeholder {
    color: #666;
  }

  button {
    grid-column: 1 / -1;
    padding: 20px;
    background: linear-gradient(to right, #4C6E58, #738C77);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    font-size: 1.3em;
    cursor: pointer;
    transition: background 0.3s ease;
    animation: fadeSlideUp 1s ease forwards;
    animation-delay: 0.4s;
  }

  button:hover {
    background: linear-gradient(to right, #3b5948, #5f7262);
  }

  @media (max-width: 480px) {
    form {
      grid-template-columns: 1fr; /* stack on small screens */
    }
  }
</style>
</head>
<body>
  <div id="quote-form-container">
    <h2>📱 Request Your Free Quote</h2>
    <p>Fill out the quick form below — we’ll try contact you within 24 hours!</p>
    <form action="https://formspree.io/f/xvgrpddd" method="POST" enctype="multipart/form-data">
      <div>
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="first_name" required placeholder="Enter your first name" />
      </div>
      <div>
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="last_name" required placeholder="Enter your last name" />
      </div>
      <div>
        <label for="postal-code">Postal Code</label>
        <input type="text" id="postal-code" name="postal_code" required placeholder="Enter your postal code" />
      </div>
      <div>
        <label for="full-address">Full Address</label>
        <input type="text" id="full-address" name="full_address" required placeholder="Enter your full address" />
      </div>
      <div>
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number" />
      </div>
      <button type="submit">Get My Quote</button>
    </form>
  </div>
</body>
</html>
